<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/web_c/homw.css">
    <style>
        h5 {
            background-color: brown !important;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        form {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h5>Contact Form</h5>
    <form action="">
        <!-- First Name -->
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" required>

        <!-- Last Name -->
        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lname" required>

        <!-- Phone Number -->
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="e.g. +8801XXXXXXXXX" required>

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <!-- Message -->
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <!-- Submit -->
        <button type="submit">Submit</button>
    </form>
</body>
</html>
