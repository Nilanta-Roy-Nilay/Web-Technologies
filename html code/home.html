<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card {
            border: 1px solid red;
        }
        .hero-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">My Website</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container mt-4">
        <img src="burger1.jpg" alt="Hero Image" class="hero-img img-fluid">
    </div>

    <!-- Card Section -->
    <div class="container mt-4">
        <div class="card text-center" style="width: 380px; margin:auto;">
            <img src="https://picsum.photos/380/200" alt="Card Image" class="card-img-top">
            <div class="card-body">
                <h5 class="card-title">Lorem ipsum dolor sit.</h5>
                <h6 class="card-subtitle mb-2 text-muted">Lorem ipsum dolor sit amet consectetur.</h6>
                <button class="btn btn-warning">See More</button>
            </div>
        </div>
    </div>

    <!-- Button Group -->
    <div class="container mt-4 text-center">
        <div class="btn-group">
            <button class="btn btn-primary">Click Here</button>
            <button class="btn btn-warning">Click Here</button>
            <button class="btn btn-danger">Click Here</button>
        </div>
    </div>

    <!-- Alert -->
    <div class="container mt-4">
        <div class="alert alert-secondary text-uppercase text-center">
            This is an alert!!!
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-4">
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
